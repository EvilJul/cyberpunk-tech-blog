<h2>暗金主题风格选择</h2>
<p class="subtitle">选择您喜欢的暗金主题方向</p>

<div class="cards">
  <div class="card" data-choice="classic" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #16213e 100%); height: 120px; display: flex; align-items: center; justify-content: center;">
      <div style="text-align: center;">
        <div style="font-size: 24px; color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5);">CLASSIC</div>
        <div style="font-size: 12px; color: #b8860b; margin-top: 8px;">深邃黑 + 纯金</div>
      </div>
    </div>
    <div class="card-body">
      <h3>经典暗金</h3>
      <p>深邃黑色背景搭配纯金色点缀，高贵典雅</p>
    </div>
  </div>
  
  <div class="card" data-choice="cyber" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #2d2d2d 100%); height: 120px; display: flex; align-items: center; justify-content: center;">
      <div style="text-align: center;">
        <div style="font-size: 24px; color: #ffd700; font-family: 'Courier New', monospace; letter-spacing: 2px;">CYBER</div>
        <div style="font-size: 12px; color: #c0c0c0; margin-top: 8px;">机械黑 + 金属金</div>
      </div>
    </div>
    <div class="card-body">
      <h3>赛博朋克</h3>
      <p>机械感黑色搭配金属金色，科技未来感</p>
    </div>
  </div>
  
  <div class="card" data-choice="warm" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #1a0f0a 0%, #2d1f1a 50%, #3d2f2a 100%); height: 120px; display: flex; align-items: center; justify-content: center;">
      <div style="text-align: center;">
        <div style="font-size: 24px; color: #daa520; text-shadow: 0 0 8px rgba(218,165,32,0.4);">WARM</div>
        <div style="font-size: 12px; color: #b8860b; margin-top: 8px;">暖黑 + 暗金</div>
      </div>
    </div>
    <div class="card-body">
      <h3>暖调暗金</h3>
      <p>深棕黑色搭配暗金色，温暖舒适</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 24px;">
  <h3>配色方案预览</h3>
  <div style="display: flex; gap: 16px; margin-top: 12px;">
    <div style="flex: 1; padding: 12px; border-radius: 8px; background: #0a0a0f; border: 1px solid #333;">
      <div style="color: #ffd700; font-weight: bold;">主背景</div>
      <div style="color: #888; font-size: 12px;">#0a0a0f</div>
    </div>
    <div style="flex: 1; padding: 12px; border-radius: 8px; background: #1a1a2e; border: 1px solid #333;">
      <div style="color: #ffd700; font-weight: bold;">卡片背景</div>
      <div style="color: #888; font-size: 12px;">#1a1a2e</div>
    </div>
    <div style="flex: 1; padding: 12px; border-radius: 8px; background: #ffd700; border: 1px solid #333;">
      <div style="color: #0a0a0f; font-weight: bold;">强调色</div>
      <div style="color: #333; font-size: 12px;">#ffd700</div>
    </div>
  </div>
</div>
