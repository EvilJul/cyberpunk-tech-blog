<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111113"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="1040" y1="0" x2="1040" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="630" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#fafafa" stroke-width="1"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke="#fafafa" stroke-width="1"/>
  </g>
  
  <!-- Left side: Browser window mockup -->
  <g transform="translate(80, 115)">
    <!-- Browser frame -->
    <rect x="0" y="0" width="480" height="400" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
    
    <!-- Browser top bar -->
    <rect x="0" y="0" width="480" height="36" rx="8" fill="#16161a"/>
    <rect x="0" y="28" width="480" height="8" fill="#16161a"/>
    <circle cx="16" cy="18" r="5" fill="#27272a"/>
    <circle cx="32" cy="18" r="5" fill="#27272a"/>
    <circle cx="48" cy="18" r="5" fill="#27272a"/>
    <rect x="70" y="10" width="200" height="16" rx="4" fill="#27272a"/>
    
    <!-- Sidebar -->
    <rect x="0" y="36" width="120" height="364" fill="#16161a"/>
    <rect x="12" y="52" width="80" height="12" rx="2" fill="#27272a"/>
    <rect x="12" y="80" width="96" height="10" rx="2" fill="#27272a" opacity="0.5"/>
    <rect x="12" y="100" width="96" height="10" rx="2" fill="#27272a" opacity="0.5"/>
    <rect x="12" y="120" width="96" height="10" rx="2" fill="#27272a" opacity="0.5"/>
    <rect x="12" y="140" width="96" height="10" rx="2" fill="#3f3f46"/>
    
    <!-- Content area -->
    <rect x="132" y="52" width="336" height="24" rx="4" fill="#27272a"/>
    <rect x="132" y="92" width="336" height="60" rx="6" fill="#1c1c1f"/>
    <rect x="144" y="104" width="200" height="10" rx="2" fill="#27272a"/>
    <rect x="144" y="122" width="160" height="8" rx="2" fill="#27272a" opacity="0.5"/>
    <rect x="132" y="168" width="336" height="60" rx="6" fill="#1c1c1f"/>
    <rect x="144" y="180" width="180" height="10" rx="2" fill="#27272a"/>
    <rect x="144" y="198" width="140" height="8" rx="2" fill="#27272a" opacity="0.5"/>
    <rect x="132" y="244" width="336" height="60" rx="6" fill="#1c1c1f"/>
    <rect x="144" y="256" width="160" height="10" rx="2" fill="#27272a"/>
    <rect x="144" y="274" width="120" height="8" rx="2" fill="#27272a" opacity="0.5"/>
    
    <!-- Status bar -->
    <rect x="132" y="340" width="80" height="24" rx="4" fill="#fafafa"/>
    <rect x="224" y="340" width="80" height="24" rx="4" fill="#27272a"/>
  </g>
  
  <!-- Right side: Title and description -->
  <g transform="translate(620, 160)">
    <!-- Logo mark -->
    <rect x="0" y="0" width="48" height="48" rx="10" fill="#27272a"/>
    <text x="24" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#fafafa" text-anchor="middle">B</text>
    
    <!-- Title -->
    <text x="0" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="#fafafa" letter-spacing="-1">Bolg</text>
    
    <!-- Subtitle -->
    <text x="0" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717a">博客服务系统</text>
    
    <!-- Divider -->
    <line x1="0" y1="175" x2="200" y2="175" stroke="#27272a" stroke-width="1"/>
    
    <!-- Features -->
    <g transform="translate(0, 200)">
      <circle cx="6" cy="6" r="4" fill="#27272a"/>
      <text x="18" y="10" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">文章管理</text>
      
      <circle cx="6" cy="34" r="4" fill="#27272a"/>
      <text x="18" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">评论系统</text>
      
      <circle cx="6" cy="62" r="4" fill="#27272a"/>
      <text x="18" y="66" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">全文搜索</text>
      
      <circle cx="6" cy="90" r="4" fill="#27272a"/>
      <text x="18" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a1a1aa">双服务器架构</text>
    </g>
  </g>
  
  <!-- Tech stack badges -->
  <g transform="translate(620, 460)">
    <rect x="0" y="0" width="60" height="24" rx="4" fill="#27272a"/>
    <text x="30" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">React</text>
    
    <rect x="68" y="0" width="60" height="24" rx="4" fill="#27272a"/>
    <text x="98" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">Express</text>
    
    <rect x="136" y="0" width="60" height="24" rx="4" fill="#27272a"/>
    <text x="166" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">SQLite</text>
    
    <rect x="204" y="0" width="72" height="24" rx="4" fill="#27272a"/>
    <text x="240" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#a1a1aa" text-anchor="middle">Tailwind</text>
  </g>
</svg>
